  build_ide:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: "omnetpp-6.x"
      - name: build-ide
        run: |
          echo 'XXXX'
          echo ${{ github.run_id }}
          cd releng
          ./build-omnetpp-in-docker
      - name: upload releases
        uses: actions/upload-artifact@v4
        with:
          path: |
            ${{ github.workspace }}/releng/dist/
          if-no-files-found: ignore
          retention-days: 1

  build-ubuntu:
    needs: get-source
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
      - name: Display structure of downloaded files
        run: ls -R
      - name: install
        run: |
          ls -R
          cd artifact
          ls
          tar -xf *linux*.tgz
          ls
          cd omnetpp-6.1
          ./install.sh -y

  build-fedora:
    needs: build_ide
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
      - name: docker run
        uses: addnab/docker-run-action@v3
        with:
          image: fedora:latest
          options: -v ${{ github.workspace }}:/omnetpp
          shell: bash
          run: |
            ls -R
            cd omnetpp/artifact
            ls
            echo "----"
            tar -xf *linux*.tgz
            ls
            echo "----"
            cd omnetpp-6.1
            ls
            echo "----"
            ./install.sh -y

  build-arch:
    needs: build_ide
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
      - name: docker run
        uses: addnab/docker-run-action@v3
        with:
          image: archlinux:latest
          options: -v ${{ github.workspace }}:/omnetpp
          shell: bash
          run: |
            ls -R
            cd omnetpp/artifact
            tar -xf *linux*.tgz
            cd omnetpp-6.1
            ./install.sh -y

  build-opensuse:
    needs: build_ide
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
      - name: docker run
        uses: addnab/docker-run-action@v3
        with:
          image: opensuse/tumbleweed:latest
          options: -v ${{ github.workspace }}:/omnetpp
          shell: bash
          run: |
            ls -R
            cd artifact
            tar -xf *linux*.tgz
            cd omnetpp-6.1
            ./install.sh -y

  build-macos:
    needs: build_ide
    runs-on: macos-latest

    steps:
      - uses: actions/download-artifact@v4
      - name: Display structure of downloaded files
        run: ls -R
      - name: install
        run: |
          cd artifact
          tar -xf *aarch64*.tgz
          ls
          cd omnetpp-6.1
          ./install.sh -y

  get-source:
    runs-on: ubuntu-latest

    steps:
      - uses: dawidd6/action-download-artifact@v6
        with:
          run_id: 11129275974
      - name: list
        run: |
          ls -R