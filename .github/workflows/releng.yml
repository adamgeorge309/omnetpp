  build-ubuntu:
    needs: get-source
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
      - name: Display structure of downloaded files
        run: ls -R
      - name: install
        run: |
          ls -R
          echo "----"
          cd artifact
          ls
          echo "----"
          tar -xf *linux-x86_64.tgz
          ls
          echo "----"
          cd omnetpp-6.1
          sudo apt update
          ./install.sh -y

  build-fedora:
    needs: get-source
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
      - name: docker run
        uses: addnab/docker-run-action@v3
        with:
          image: fedora:latest
          options: -v ${{ github.workspace }}:/omnetpp
          shell: bash
          run: |
            cd omnetpp/artifact
            ls
            echo "----"
            tar -xf *linux-x86_64.tgz
            ls
            echo "----"
            cd omnetpp-6.1
            ls
            echo "----"
            ./install.sh -y
            source setenv
            cd samples/aloha
            ./aloha -u Cmdenv -c PureAloha1 --sim-time-limit=10s

  build-arch:
    needs: get-source
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
      - name: docker run
        uses: addnab/docker-run-action@v3
        with:
          image: archlinux:latest
          options: -v ${{ github.workspace }}:/omnetpp
          shell: bash
          run: |
            cd omnetpp/artifact
            tar -xf *linux-x86_64.tgz
            cd omnetpp-6.1
            pacman -Syy
            ./install.sh -y
            source setenv
            cd samples/aloha
            ./aloha -u Cmdenv -c PureAloha1 --sim-time-limit=10s

  build-opensuse:
    needs: get-source
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
      - name: docker run
        uses: addnab/docker-run-action@v3
        with:
          image: opensuse/tumbleweed:latest
          options: -v ${{ github.workspace }}:/omnetpp
          shell: bash
          run: |
            cd omnetpp/artifact
            tar -xf *linux-x86_64.tgz
            cd omnetpp-6.1
            zypper refresh
            ./install.sh -y
            source setenv
            ls
            cd samples/aloha
            ./aloha -u Cmdenv -c PureAloha1 --sim-time-limit=10s

  build-macos:
    needs: get-source
    runs-on: macos-latest

    steps:
      - uses: actions/download-artifact@v4
      - name: Display structure of downloaded files
        run: ls -R
      - name: install
        run: |
          cd artifact
          tar -xf *macos-aarch64*.tgz
          ls
          cd omnetpp-6.1
          ./install.sh -y
          source setenv
          cd samples/aloha
          ./aloha -u Cmdenv -c PureAloha1 --sim-time-limit=10s

  build-windows:
    needs: get-source
    runs-on: windows-latest

    steps:
      - uses: actions/download-artifact@v4
      - name: Display structure of downloaded files
        run: ls -R
      - name: install
        run: |
          cd artifact
          7z x *windows-x86_64*.zip
          ls
          cd omnetpp-6.1
          mingwenv.cmd
          ./install.sh -y
          . setenv
          cd samples/aloha
          ./aloha -u Cmdenv -c PureAloha1 --sim-time-limit=10s

  get-source:
    runs-on: ubuntu-latest

    steps:
      - uses: dawidd6/action-download-artifact@v6
        with:
          run_id: 11129275974
      - name: list
        run: |
          ls -R
      - name: upload releases
        uses: actions/upload-artifact@v4
        with:
          path: |
            ${{ github.workspace }}/artifact/
          if-no-files-found: ignore
          retention-days: 1